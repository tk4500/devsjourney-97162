<div class="status-container" *ngIf="gameplay.currentLevel() as level">

  <!-- Header: Level Title & Player Sprite -->
  <div class="status-header">
    <div class="header-text">
      <h2>Level {{ level.orderId }}</h2>
      <h3>{{ level.name }}</h3>
    </div>
    <img
      class="player-sprite"
      [src]="'sprites/junior/' + gameplay.playerSprite()"
      alt="Dev Júnior">
  </div>

  <!-- Main Action Button -->
<div class="action-section">
  <button
    pButton
    pRipple
    id="run-button"
    label="Run Code"
    icon="pi pi-play"
    styleClass="run-code-button"
    (click)="runCode()"
    [disabled]="interpreterService.isRunning() || gameplay.hasWon() || gameplay.hasFailed()">
  </button>
</div>

  <!-- Tasks & Focus Section -->
  <div class="tasks-section">
    <h4>Objectives</h4>
    <div *ngFor="let task of gameplay.tasks()" class="task-card">
      <span>{{ task.name }}, {{ task.completion() }}%</span>
      <p-progressBar [value]="task.completion()" [showValue]="false"></p-progressBar>
    </div>
    <div class="focus-card" *ngIf="level.usesFocus">
      <span>Focus</span>
      <p>{{ gameplay.focus() }}</p>
    </div>
  </div>

  <!-- Resource Bars Section -->
  <div class="resource-section">
    <div *ngIf="level.usesStamina" class="resource-bar" pTooltip="Energy to write code. Restored by drinking coffee.">
      <span>Stamina</span>
      <p-progressBar class="stamina-bar" [value]="gameplay.stamina()"></p-progressBar>
    </div>
    <!-- Placeholder for Time if you implement it -->
    <div *ngIf="level.usesTime" class="resource-bar">
      <span>Time</span>
      <p-progressBar class="time-bar" [value]="0"></p-progressBar>
    </div>
  </div>

  <!-- Game End State Panel -->
  <div *ngIf="gameplay.hasWon() || gameplay.hasFailed()" class="end-state-panel">
    <div *ngIf="gameplay.hasWon()" class="win-message">
      <h2>Level Complete!</h2>
      <p>Moving to the next level...</p>
    </div>
    <div *ngIf="gameplay.hasFailed()" class="fail-message">
      <h2>Out of Stamina!</h2>
      <p-button label="Try Again" icon="pi pi-refresh" (click)="tryAgain()"></p-button>
    </div>
  </div>

</div>
