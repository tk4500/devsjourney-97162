<app-game-tutorial></app-game-tutorial>

<div class="game-page-container">
  <app-top-bar></app-top-bar>

  <!-- USE YOUR CUSTOM FLEXBOX LAYOUT INSTEAD OF PRIMEFLEX GRID -->
  <main class="game-main-content">

    <aside class="game-sidebar" id="sidebar">
      <app-game-status [gameplay]="gameplayService"></app-game-status>
    </aside>

    <section class="blockly-container">
      <app-game-blockly [level]="currentLevel"></app-game-blockly>
    </section>

  </main>
</div>
<app-level-complete-modal
  [isVisible]="isLevelCompleteVisible"
  [result]="levelResult"
  [hasNextLevel]="hasNextLevel"
  (playAgain)="onPlayAgain()"
  (nextLevel)="onNextLevel()"
  (backToMenu)="onBackToMenu()">
</app-level-complete-modal>
